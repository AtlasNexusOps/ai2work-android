name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - uses: actions/setup-java@v4
        with: { distribution: "temurin", java-version: "21" }
      - uses: android-actions/setup-android@v3
        with: { packages: "platforms;android-34 build-tools;34.0.0" }

      - run: npm install
      - run: npx cap add android
      - run: npx cap sync android

      - name: Add Kotlin + BouncyCastle
        run: |
          sed -i "/dependencies {/a \        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:2.0.21'" android/build.gradle
          echo "" >> android/app/build.gradle
          echo "apply plugin: 'kotlin-android'" >> android/app/build.gradle
          echo "dependencies { implementation 'org.bouncycastle:bcprov-jdk15on:1.70' }" >> android/app/build.gradle

      - name: Copy native wallet sources
        run: |
          NATIVE_DIR="android/app/src/main/java/tech/atlasnexus/ai2work/wallet"
          mkdir -p "$NATIVE_DIR"
          cp -v native/android/tech/atlasnexus/ai2work/wallet/*.kt "$NATIVE_DIR/"
          cp -v native/android/tech/atlasnexus/ai2work/wallet/*.java "$NATIVE_DIR/"

      - run: cd android && ./gradlew assembleRelease

      - name: Delete old release tag (if exists)
        run: |
          gh release delete v1.0.0 --yes 2>/dev/null || true
          git push origin :refs/tags/v1.0.0 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          files: android/app/build/outputs/apk/release/app-release-unsigned.apk
          name: ai2work.apk
          body: "Native Ethereum wallet build — Android Keystore, EIP-1559, wagmi-compatible"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
