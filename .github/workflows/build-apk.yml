name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - uses: actions/setup-java@v4
        with: { distribution: "temurin", java-version: "21" }
      - uses: android-actions/setup-android@v3
        with: { packages: "platforms;android-34 build-tools;34.0.0" }

      - run: npm install
      - run: npx cap add android
      - run: npx cap sync android

      # Add BouncyCastle dependency for secp256k1 ECDSA
      - name: Add BouncyCastle to build.gradle
        run: |
          sed -i "/dependencies {/a \    implementation 'org.bouncycastle:bcprov-jdk15on:1.70'" android/app/build.gradle

      # Copy native wallet plugin sources into the generated android project
      - name: Copy native wallet plugin
        run: |
          NATIVE_DIR="android/app/src/main/java/tech/atlasnexus/ai2work/wallet"
          mkdir -p "$NATIVE_DIR"
          cp -v native/android/tech/atlasnexus/ai2work/wallet/*.kt "$NATIVE_DIR/"
          cp -v native/android/tech/atlasnexus/ai2work/wallet/*.java "$NATIVE_DIR/"

      - run: cd android && ./gradlew assembleRelease

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          files: android/app/build/outputs/apk/release/app-release-unsigned.apk
          name: ai2work.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
